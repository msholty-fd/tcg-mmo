# Fly.io config — one machine is the whole stack (WS + static client + /health).
# Region is arbitrary; change it (and the volume's region) to wherever is
# closest to the players.
app = "tcg-mmo"
primary_region = "sjc"

# PORT is 8080 in production because Fly's Launch wizard resets internal_port
# to 8080 whenever it regenerates config — matching it beats fighting it.
# Local dev stays on 8081 (code default).
[env]
  PORT = "8080"
  TRUST_PROXY = "1"
  DATA_FILE = "/data/profiles.json"

[mounts]
  source = "emberwood_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # never sleep a stateful game server — it would disconnect everyone
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
