# fly.toml app configuration file generated for tcg-mmo on 2026-07-07T13:54:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tcg-mmo'
primary_region = 'sjc'

[build]

[env]
  DB_FILE = '/data/profiles.db'
  DATA_FILE = '/data/profiles.json'   # legacy JSON; imported into the DB on first boot
  PORT = '8080'
  TRUST_PROXY = '1'

[[mounts]]
  source = 'emberwood_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
